<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>THE LUX - ELITE POS v17 PLATINUM</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
    --primary: #3a6df0; 
    --primary-glow: rgba(58, 109, 240, 0.6);
    --bg: #020204; 
    --card: rgba(20, 20, 25, 0.8); 
    --border: rgba(255, 255, 255, 0.06);
    --text: #ffffff; 
    --text-dim: #94a3b8; 
    --danger: #ff4646; 
    --success: #00f294;
    --accent-gradient: linear-gradient(135deg, #3a6df0 0%, #8b5cf6 100%);
}

body { 
    font-family: 'Plus Jakarta Sans', sans-serif; 
    background: var(--bg); 
    color: var(--text); 
    margin: 0; 
    padding: 20px;
    overflow-x: hidden;
    background-image: 
        radial-gradient(circle at 0% 0%, rgba(58, 109, 240, 0.12) 0%, transparent 35%),
        radial-gradient(circle at 100% 100%, rgba(139, 92, 246, 0.1) 0%, transparent 35%);
    background-attachment: fixed; 
    min-height: 100vh;
}

/* --- ANIMATIONEN --- */
@keyframes entrance {
    from { opacity: 0; transform: scale(0.95) translateY(20px); filter: blur(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
}

@keyframes pulse-glow {
    0% { box-shadow: 0 0 20px rgba(58, 109, 240, 0.2); }
    50% { box-shadow: 0 0 40px rgba(58, 109, 240, 0.5); }
    100% { box-shadow: 0 0 20px rgba(58, 109, 240, 0.2); }
}

/* --- HEADER & NAV --- */
#header-info { 
    position: fixed; top: 25px; left: 25px; z-index: 1000; 
    background: var(--card); padding: 20px 30px; border-radius: 30px; 
    border: 1px solid var(--border); backdrop-filter: blur(25px); 
    box-shadow: 0 15px 40px rgba(0,0,0,0.6);
}

#nav-right { 
    position: fixed; top: 25px; right: 25px; display: none; gap: 15px; z-index: 1000; 
}

.section { 
    display: none; margin-top: 150px; max-width: 1300px; margin-left: auto; margin-right: auto; 
    animation: entrance 0.7s cubic-bezier(0.16, 1, 0.3, 1);
}

.active { display: block !important; }

/* --- UI ELEMENTE --- */
.cat-nav { 
    display: flex; gap: 15px; margin-bottom: 40px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none;
}

.btn-cat { 
    background: var(--card); color: var(--text-dim); border: 1px solid var(--border); 
    padding: 18px 32px; border-radius: 25px; cursor: pointer; font-weight: 700; 
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); white-space: nowrap; backdrop-filter: blur(10px);
}

.btn-cat.active { 
    background: var(--accent-gradient); color: white; border-color: transparent; 
    box-shadow: 0 10px 30px var(--primary-glow); transform: scale(1.08);
}

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }

.card { 
    background: var(--card); padding: 30px; border-radius: 40px; border: 1px solid var(--border); 
    backdrop-filter: blur(15px); transition: all 0.4s ease; position: relative;
}

.card:hover { 
    border-color: var(--primary); transform: translateY(-8px); 
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}

.qty-ctrl { 
    display: flex; align-items: center; justify-content: space-between; 
    background: rgba(0,0,0,0.4); border-radius: 22px; margin-top: 20px; height: 60px; border: 1px solid var(--border);
}

.qty-btn { 
    width: 65px; height: 100%; background: transparent; color: white; border: none; 
    font-size: 26px; cursor: pointer; transition: 0.2s;
}
.qty-btn:hover { background: rgba(255,255,255,0.1); color: var(--primary); }

.qty-input { 
    width: 70px; background: transparent; border: none; color: white; text-align: center; 
    font-weight: 800; font-size: 22px; outline: none; 
}

/* --- BUTTONS --- */
button { 
    padding: 16px 28px; border-radius: 22px; border: none; cursor: pointer; 
    font-weight: 800; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-family: inherit;
}

.btn-blue { 
    background: var(--accent-gradient); color: white; 
    box-shadow: 0 8px 25px var(--primary-glow); 
}
.btn-blue:hover { transform: scale(1.03); filter: brightness(1.2); }

.btn-red { background: linear-gradient(135deg, #ff4646 0%, #b91c1c 100%); color: white; }
.btn-red:hover { transform: scale(1.03); box-shadow: 0 8px 25px rgba(255, 70, 70, 0.4); }

.btn-dark { background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--border); backdrop-filter: blur(10px); }
.btn-dark:hover { background: rgba(255,255,255,0.12); border-color: var(--primary); }

/* --- BILLING --- */
#bill-area { 
    margin-top: 60px; background: rgba(58, 109, 240, 0.05); padding: 45px; 
    border-radius: 50px; border: 1px solid rgba(58, 109, 240, 0.3); 
    box-shadow: 0 30px 60px rgba(0,0,0,0.4);
}

/* --- LOGIN --- */
#login-overlay { 
    position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; 
}

.login-card {
    background: var(--card); padding: 60px; border-radius: 60px; width: 420px; text-align: center; 
    border: 1px solid var(--border); backdrop-filter: blur(40px);
    animation: entrance 1s ease-out, pulse-glow 3s infinite ease-in-out;
}

input, select { 
    background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: white; 
    padding: 20px; border-radius: 22px; width: 100%; margin-bottom: 15px; 
    font-family: inherit; font-size: 16px; outline: none; transition: 0.3s;
}
input:focus { border-color: var(--primary); background: rgba(0,0,0,0.5); }

/* --- MODALS --- */
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 10000; backdrop-filter: blur(20px); }
.modal-content { background: #0c0c10; padding: 50px; border-radius: 50px; border: 1px solid var(--border); width: 95%; max-width: 900px; position: relative; }

.menu-dots { position: absolute; top: 30px; right: 35px; font-size: 32px; cursor: pointer; color: var(--text-dim); transition: 0.3s; }
.menu-dots:hover { color: white; transform: rotate(90deg); }

.dropdown-menu { position: absolute; top: 75px; right: 35px; background: #1a1a21; border: 1px solid var(--border); border-radius: 20px; display: none; z-index: 10001; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
.dropdown-menu div { padding: 15px 30px; cursor: pointer; font-size: 15px; border-bottom: 1px solid var(--border); transition: 0.2s; }
.dropdown-menu div:hover { background: var(--primary); color: white; }

table { width: 100%; border-collapse: separate; border-spacing: 0 10px; margin-top: 20px; }
table tr { background: rgba(255,255,255,0.02); border-radius: 15px; }
table td { padding: 20px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
table td:first-child { border-left: 1px solid var(--border); border-radius: 15px 0 0 15px; }
table td:last-child { border-right: 1px solid var(--border); border-radius: 0 15px 15px 0; }

</style>
</head>
<body>

<div id="header-info">
    <div id="time-display" style="font-size: 26px; font-weight: 800; letter-spacing: -1px;">00:00:00</div>
    <div id="live-stempel" style="display:none; color:var(--success); font-size: 13px; font-weight: 800; margin-top: 6px; letter-spacing: 1px;">• SHIFT ACTIVE</div>
</div>

<div id="nav-right">
    <button id="stempel-btn" class="btn-blue" onclick="toggleStempel()">KOMMEN</button>
    <button class="btn-dark" onclick="viewUserLogs(currentUserIndex())">MEINE ZEITEN</button>
    <button id="dash-btn" class="btn-dark" onclick="toggleView()" style="display:none;">MANAGEMENT</button>
    <button class="btn-red" onclick="location.reload()" style="padding: 16px 20px;">✕</button>
</div>

<div id="login-overlay">
    <div class="login-card">
        <div style="font-size: 12px; letter-spacing: 6px; color: var(--primary); margin-bottom: 10px; font-weight: 800; opacity: 0.8;">PREMIUM POS</div>
        <h1 style="font-size: 64px; margin: 0 0 40px 0; letter-spacing: -4px; font-weight: 800; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">THE LUX</h1>
        <input type="text" id="logU" placeholder="Username">
        <input type="password" id="logP" placeholder="Password">
        <button class="btn-blue" style="width:100%; margin-top: 20px; padding: 22px; font-size: 18px; letter-spacing: 1px;" onclick="login()">ZUGRIFF BESTÄTIGEN</button>
    </div>
</div>

<div id="main-ui" class="section">
    <div class="cat-nav" id="cat-nav-bar">
        <button class="btn-cat active" onclick="changeTab('Getränke', this)">Getränke</button>
        <button class="btn-cat" onclick="changeTab('Snacks', this)">Snacks</button>
        <button class="btn-cat" onclick="changeTab('Fahrten', this)">Fahrten</button>
        <button class="btn-cat" onclick="changeTab('Heli', this)">Flüge</button>
        <button class="btn-cat" onclick="changeTab('Fightclub', this)">Fightclub</button>
        <button class="btn-cat" onclick="changeTab('Wetten', this)">Wetten</button>
    </div>
    <div class="grid" id="grid-pos"></div>
    
    <div id="bet-form" style="display:none; background: var(--card); padding: 50px; border-radius: 50px; border: 1px solid var(--border);">
        <h2 style="margin-top:0; font-size: 32px;">Wette platzieren</h2>
        <div class="grid" style="grid-template-columns: 1fr 1fr 1fr;">
            <input type="text" id="bet-user" placeholder="Name">
            <input type="text" id="bet-tel" placeholder="Tel">
            <input type="number" id="bet-amount" placeholder="Einsatz">
        </div>
        <button class="btn-blue" style="width:100%; margin-top:30px; padding: 22px;" onclick="addBetToBill()">WETTE HINZUFÜGEN</button>
    </div>

    <div id="bill-area">
        <div id="bill-items" style="margin-bottom:30px; font-size: 20px; color: var(--text-dim); line-height: 1.6;"></div>
        <div style="display:flex; justify-content:space-between; align-items:center; border-top: 1px solid var(--border); padding-top: 30px;">
            <span style="color: var(--text-dim); font-weight: 600; font-size: 18px;">GESAMTBERECHNUNG</span>
            <span id="bill-total" style="font-size: 56px; font-weight: 800; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">0 EUR</span>
        </div>
        <button class="btn-blue" style="width:100%; margin-top:40px; font-size:24px; padding: 35px; letter-spacing: 1px;" onclick="checkout()">QUITTUNG ABSCHLIESSEN & SENDEN</button>
    </div>
</div>

<div id="dash-ui" class="section">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:50px;">
        <h1 style="margin:0; font-size:48px; font-weight: 800; letter-spacing: -2px;">Management</h1>
        <button class="btn-blue" onclick="openModal('modal-new-user')">+ Mitarbeiter</button>
    </div>

    <div id="boss-analytics" style="display:none; margin-bottom:60px;">
        <div style="background: var(--card); padding:45px; border-radius:50px; border:1px solid var(--primary); position: relative; overflow: hidden;">
            <div style="display:flex; justify-content:space-between; margin-bottom:30px; position: relative; z-index: 1;">
                <h2 style="margin:0; font-size: 32px;">Umsatzanalyse</h2>
                <div id="bestseller-badge" style="background:var(--accent-gradient); padding:12px 25px; border-radius:20px; font-size:14px; font-weight:800; box-shadow: 0 10px 20px var(--primary-glow);">TOP: -</div>
            </div>
            <div class="stats-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px;">
                <div class="chart-container" style="background:rgba(0,0,0,0.3); border-radius:30px; padding: 25px; border: 1px solid var(--border);"><h3>Woche</h3><canvas id="chartWeek"></canvas></div>
                <div class="chart-container" style="background:rgba(0,0,0,0.3); border-radius:30px; padding: 25px; border: 1px solid var(--border);"><h3>Monat</h3><canvas id="chartMonth"></canvas></div>
                <div class="chart-container" style="background:rgba(0,0,0,0.3); border-radius:30px; padding: 25px; border: 1px solid var(--border);"><h3>Jahr</h3><canvas id="chartYear"></canvas></div>
            </div>
        </div>
    </div>

    <div id="user-list" class="grid"></div>
    <h2 style="margin-top:80px; margin-bottom:30px; font-size: 38px;">Lagerverwaltung</h2>
    <div id="lager-list" class="grid"></div>
</div>

<div id="modal-new-user" class="modal"><div class="modal-content"><h3>Mitarbeiter anlegen</h3><input type="text" id="new-u-name" placeholder="Name"><input type="password" id="new-u-pass" placeholder="Passwort"><select id="new-u-role"><option>Geschäftsinhaber</option><option>Geschäftsführer</option><option>Management</option><option>Bartender</option><option>Kellner</option><option>Security</option><option>Reception</option></select><label style="display:flex; align-items:center; gap:12px; margin: 20px 0; color: var(--text-dim);"><input type="checkbox" id="new-u-chauffeur" style="width:auto; margin:0; scale: 1.5;"> Zweitrolle Chauffeur</label><div style="display:flex; gap:15px; margin-top:40px;"><button class="btn-blue" style="flex:2" onclick="saveNewUser()">SPEICHERN</button><button class="btn-dark" style="flex:1" onclick="closeModals()">ABBRUCH</button></div></div></div>
<div id="modal-lager-edit" class="modal"><div class="modal-content"><h3 id="lager-edit-title">Bestand</h3><input type="number" id="lager-edit-val" placeholder="Stückzahl"><button class="btn-dark" style="width:100%; margin-bottom:15px;" onclick="setUnendlich()">VARIABLE UNENDLICH</button><div id="unendlich-msg" style="color:var(--success); font-size:14px; text-align:center; display:none; margin-bottom: 15px; font-weight: 800;">✓ UNENDLICH AKTIVIERT</div><button class="btn-blue" style="width:100%" onclick="saveLagerEdit()">BESTÄTIGEN</button></div></div>
<div id="modal-user-view" class="modal"><div class="modal-content"><div class="menu-dots" onclick="toggleUserMenu()">⋮</div><div id="user-menu" class="dropdown-menu"><div onclick="editUserField('name')">Name Ändern</div><div onclick="editUserField('pass')">Passwort Ändern</div><div onclick="deleteCurrentUser()" style="color:var(--danger)">Löschen</div></div><h2 id="view-u-name" style="margin-bottom:5px; font-size: 42px;">Name</h2><p id="view-u-role" style="color:var(--primary); font-weight:800; margin-top:0; letter-spacing: 2px;"></p><div id="view-u-stats" style="display:grid; grid-template-columns: repeat(4, 1fr); gap:15px; margin-top:30px; padding:25px; background:rgba(255,255,255,0.03); border-radius:30px;"></div><div id="view-u-logs" style="max-height:300px; overflow-y:auto; margin-top:30px; border-top:1px solid var(--border);"></div><button class="btn-dark" style="width:100%; margin-top:40px; padding: 25px;" onclick="closeModals()">ZURÜCK</button></div></div>

<script>
// --- LOGIK (EXAKT DEIN SKRIPT) ---
const CLOUD_DB = "https://the-lux-system-default-rtdb.firebaseio.com/data.json";
const WH_MAIN = "https://discord.com/api/webhooks/1480511718445547564/eF7F71sEzjAeEuisEI8C59wX9yzhiw8ClXaGHG45Vo7ZLuZgNXftx0tUpgG-w6ISe2pe";
const WH_BETS = "https://discord.com/api/webhooks/1480522708092588064/zdVPCFNZL7SEv9taen6e4zqFYZca32uHVTWC6HDMBisTkG8dQfi5YwFjtaOsYrv8fRkH";
const WH_STOCK = "https://discord.com/api/webhooks/1480549073256710214/nXBqxQMs8fo5PLo_sVyH7STy2tUqOauxdRCXek0gd1lmBDCtb0Qw0WsguY_J1WCs7ecj";

const ALL_PRODUCTS = [
    {n:"Tequila", p:500, c:"Getränke"}, {n:"Whiskey", p:300, c:"Getränke"}, {n:"Wein", p:200, c:"Getränke"},
    {n:"Champagner", p:250, c:"Getränke"}, {n:"Gin", p:200, c:"Getränke"}, {n:"Cognac", p:300, c:"Getränke"},
    {n:"Cocktail", p:200, c:"Getränke"}, {n:"Martini", p:200, c:"Getränke"}, {n:"Cola", p:100, c:"Getränke"},
    {n:"Energy", p:100, c:"Getränke"}, {n:"Wasser", p:100, c:"Getränke"},
    {n:"Pommes", p:150, c:"Snacks"}, {n:"Erdnüsse", p:100, c:"Snacks"},
    {n:"Grundgebühr Fahrt", p:10000, c:"Fahrten"}, {n:"Kilometer Fahrt", p:200, c:"Fahrten"},
    {n:"Grundgebühr Heli", p:20000, c:"Heli"}, {n:"Kilometer Heli", p:500, c:"Heli"},
    {n:"Event Eintritt", p:5000, c:"Fightclub"}, {n:"Miete Grundgebühr 1H", p:50000, c:"Fightclub"}, {n:"+30 Minuten", p:30000, c:"Fightclub"}
];

let users = [{name:"LUX_STAFF", pass:"Staff3221", role:"Geschäftsinhaber", logs:[], sales:[]}];
let lager = {};
let basket = {}, manualBets = [], currentUser = null, activeShiftStart = null, currentEditLager = null, selectedUserIdx = null;
let chartW, chartM, chartY;

async function save() { await fetch(CLOUD_DB, { method: 'PUT', body: JSON.stringify({ users, lager }) }); }
async function load() {
    try {
        const r = await fetch(CLOUD_DB);
        const d = await r.json();
        if(d && d.users) users = d.users;
        if(d && d.lager) lager = d.lager;
    } catch(e) { console.error("Load failed"); }
}

function currentUserIndex() { return users.findIndex(u => u.name === currentUser.name); }

function login() {
    const u = document.getElementById('logU').value, p = document.getElementById('logP').value;
    const f = users.find(x => x.name === u && x.pass === p);
    if(f) {
        currentUser = f; document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('nav-right').style.display = 'flex';
        document.getElementById('main-ui').classList.add('active');
        if(["Geschäftsinhaber", "Geschäftsführer", "Management"].includes(f.role)) document.getElementById('dash-btn').style.display = 'block';
        ALL_PRODUCTS.forEach(i => { if(lager[i.n] === undefined) lager[i.n] = 999; });
        changeTab('Getränke', document.querySelector('.btn-cat'));
    } else alert("CODE FALSCH");
}

function changeTab(cat, btn) {
    document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active')); btn.classList.add('active');
    if(cat === "Wetten") { document.getElementById('grid-pos').style.display='none'; document.getElementById('bet-form').style.display='block'; }
    else { document.getElementById('grid-pos').style.display='grid'; document.getElementById('bet-form').style.display='none'; renderPOS(cat === "Flüge" ? "Heli" : cat); }
}

function renderPOS(cat) {
    document.getElementById('grid-pos').innerHTML = ALL_PRODUCTS.filter(i => i.c === cat).map(i => `
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:start;">
                <div><b style="font-size:20px;">${i.n}</b><br><small style="color:var(--text-dim)">Lager: ${lager[i.n] === Infinity ? '∞' : lager[i.n]}</small></div>
                <span style="color:var(--primary); font-weight:800; font-size:22px;">${i.p}€</span>
            </div>
            <div class="qty-ctrl">
                <button class="qty-btn" onclick="updateBasket('${i.n}',-1)">-</button>
                <input type="number" class="qty-input" id="inp-${i.n}" value="${basket[i.n]||0}" onchange="manualInput('${i.n}', this.value)">
                <button class="qty-btn" onclick="updateBasket('${i.n}',1)">+</button>
            </div>
        </div>`).join('');
}

function updateBasket(name, val) { manualInput(name, (basket[name] || 0) + val); }
function manualInput(name, val) {
    let t = parseInt(val) || 0; if(t < 0) t = 0; if(lager[name] !== Infinity && t > lager[name]) t = lager[name];
    basket[name] = t; renderPOS(document.querySelector('.btn-cat.active').innerText === "Flüge" ? "Heli" : document.querySelector('.btn-cat.active').innerText); renderBill();
}

function addBetToBill() {
    const n = document.getElementById('bet-user').value, t = document.getElementById('bet-tel').value, a = parseInt(document.getElementById('bet-amount').value);
    if(!n || a < 10000) return alert("MIN 10.000€");
    manualBets.push({name:n, tel:t, amount:a}); document.getElementById('bet-user').value=""; document.getElementById('bet-tel').value=""; document.getElementById('bet-amount').value=""; renderBill();
}

function renderBill() {
    let t = 0, h = "";
    for(let n in basket) if(basket[n]>0) { let i = ALL_PRODUCTS.find(p=>p.n===n); t+=basket[n]*i.p; h+=`<div>${n} x${basket[n]}</div>`; }
    manualBets.forEach(b => { t+=b.amount; h+=`<div style="color:var(--danger)">Wette: ${b.name}</div>`; });
    document.getElementById('bill-items').innerHTML = h; document.getElementById('bill-total').innerText = t.toLocaleString()+" EUR"; return t;
}

async function checkout() {
    const t = renderBill(); if(t === 0) return;
    const itemsLog = [];
    for(let n in basket) {
        if(basket[n] > 0) {
            itemsLog.push({n, q: basket[n], p: ALL_PRODUCTS.find(x=>x.n===n).p});
            if(lager[n] !== Infinity) {
                lager[n] -= basket[n];
                if(lager[n] < 20) fetch(WH_STOCK, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({embeds:[{title:"⚠️ LAGER WARNUNG", description:`${n} fast leer: ${lager[n]}`, color:16776960}]})});
            }
        }
    }
    const idx = currentUserIndex();
    if(!users[idx].sales) users[idx].sales = [];
    users[idx].sales.push({ d: new Date().toISOString(), total: t, items: itemsLog });

    await fetch(WH_MAIN, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({embeds:[{title:"BUCHUNG", description:`Mitarbeiter: ${currentUser.name}\n${document.getElementById('bill-items').innerText}\nTOTAL: ${t}€`, color:3829232}]})});
    if(manualBets.length > 0) fetch(WH_BETS, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({embeds:[{title:"WETTE", description:manualBets.map(b=>`${b.name}: ${b.amount}€`).join("\n"), color:16711680}]})});
    
    basket={}; manualBets=[]; await save(); renderBill(); changeTab('Getränke', document.querySelector('.btn-cat')); alert("ERFOLGREICH");
}

function toggleView() {
    document.getElementById('dash-ui').classList.toggle('active');
    document.getElementById('main-ui').classList.toggle('active');
    if(document.getElementById('dash-ui').classList.contains('active')) {
        renderManagement();
        if(["Geschäftsinhaber", "Geschäftsführer", "Management"].includes(currentUser.role)) {
            document.getElementById('boss-analytics').style.display = 'block';
            updateBossCharts();
        }
    }
}

function updateBossCharts() {
    const allSales = users.flatMap(u => u.sales || []);
    const now = new Date();
    const counts = {};
    allSales.forEach(s => s.items.forEach(i => counts[i.n] = (counts[i.n]||0) + i.q));
    const top = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
    document.getElementById('bestseller-badge').innerText = top ? `TOP: ${top[0]} (${top[1]})` : "TOP: -";
    const days = [0,0,0,0,0,0,0], weeks = [0,0,0,0,0], months = Array(12).fill(0);
    allSales.forEach(s => {
        const d = new Date(s.d);
        if(d.getFullYear() === now.getFullYear()) {
            months[d.getMonth()] += s.total;
            if(d.getMonth() === now.getMonth()) {
                const kw = Math.ceil(d.getDate() / 7);
                weeks[kw-1] += s.total;
            }
            const diff = now - d;
            if(diff < 7 * 86400000) days[d.getDay()] += s.total;
        }
    });
    if(chartW) chartW.destroy(); if(chartM) chartM.destroy(); if(chartY) chartY.destroy();
    const cfg = (l, d) => ({ type:'pie', data:{ labels:l, datasets:[{data:d, backgroundColor:['#3a6df0','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4']}]}, options:{ plugins:{ legend:{display:false}}}});
    chartW = new Chart(document.getElementById('chartWeek'), cfg(['So','Mo','Di','Mi','Do','Fr','Sa'], days));
    chartM = new Chart(document.getElementById('chartMonth'), cfg(['KW1','KW2','KW3','KW4','KW5'], weeks));
    chartY = new Chart(document.getElementById('chartYear'), cfg(['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'], months));
}

function renderManagement() {
    document.getElementById('user-list').innerHTML = users.map((u, i) => `<div class="card" onclick="viewUserLogs(${i})" style="cursor:pointer"><b>${u.name}</b><br><span style="color:var(--primary);font-size:14px;font-weight:700;">${u.role}</span></div>`).join('');
    document.getElementById('lager-list').innerHTML = Object.keys(lager).map(n => `<div class="card" style="padding:20px;"><div style="display:flex; justify-content:space-between; align-items:center;"><small style="font-weight:700;">${n}</small><b>${lager[n] === Infinity ? '∞' : lager[n]}</b><button class="btn-dark" style="padding:8px 15px; font-size:12px;" onclick="openLagerEdit('${n}')">EDIT</button></div></div>`).join('');
}

function viewUserLogs(i) {
    selectedUserIdx = i; const u = users[i]; 
    document.getElementById('view-u-name').innerText = u.name;
    document.getElementById('view-u-role').innerText = u.role.toUpperCase();
    const now = new Date();
    let w=0, m=0, y=0, count=0;
    (u.sales||[]).forEach(s => {
        const d = new Date(s.d); count++;
        if(d.getFullYear() === now.getFullYear()) {
            y += s.total;
            if(d.getMonth() === now.getMonth()) m += s.total;
            if(now - d < 7 * 86400000) w += s.total;
        }
    });
    document.getElementById('view-u-stats').innerHTML = `
        <div><small>SALES</small><br><b>${count}</b></div>
        <div><small>WEEK</small><br><b>${w}€</b></div>
        <div><small>MONTH</small><br><b>${m}€</b></div>
        <div><small>YEAR</small><br><b>${y}€</b></div>
    `;
    let h = "<table>"; (u.logs||[]).slice().reverse().forEach(l => { let s=new Date(l.s), e=new Date(l.e); h+=`<tr><td>${s.toLocaleDateString()}</td><td style="text-align:right; font-weight:800; color:var(--primary);">${Math.floor((e-s)/60000)} MIN</td></tr>`; });
    document.getElementById('view-u-logs').innerHTML = h + "</table>"; openModal('modal-user-view');
}

function openModal(id) { document.getElementById(id).style.display = 'flex'; }
function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); document.getElementById('unendlich-msg').style.display='none'; }
function openLagerEdit(n) { currentEditLager = n; document.getElementById('lager-edit-title').innerText = n; openModal('modal-lager-edit'); }
function setUnendlich() { document.getElementById('lager-edit-val').value = ""; document.getElementById('unendlich-msg').style.display = 'block'; }
async function saveLagerEdit() { const val = document.getElementById('lager-edit-val').value; lager[currentEditLager] = document.getElementById('unendlich-msg').style.display === 'block' ? Infinity : parseInt(val); await save(); closeModals(); renderManagement(); }
async function saveNewUser() { const n = document.getElementById('new-u-name').value, p = document.getElementById('new-u-pass').value, r = document.getElementById('new-u-role').value, c = document.getElementById('new-u-chauffeur').checked; if(!n || !p) return; users.push({name:n, pass:p, role:r, chauffeur:c, logs:[], sales:[]}); await save(); closeModals(); renderManagement(); }
function toggleUserMenu() { const m = document.getElementById('user-menu'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; }
async function editUserField(f) { const n = prompt("Neuer Wert:"); if(n) { users[selectedUserIdx][f==='name'?'name':'pass']=n; await save(); renderManagement(); closeModals(); } }
async function deleteCurrentUser() { if(users[selectedUserIdx].name==='LUX_STAFF')return; if(confirm("Löschen?")) { users.splice(selectedUserIdx,1); await save(); renderManagement(); closeModals(); } }
function toggleStempel() {
    const btn = document.getElementById('stempel-btn');
    if(btn.innerText === "KOMMEN") { activeShiftStart = new Date(); btn.innerText = "GEHEN"; btn.className = "btn-red"; document.getElementById('live-stempel').style.display = "block"; }
    else { const idx = currentUserIndex(); if(!users[idx].logs) users[idx].logs = []; users[idx].logs.push({ s: activeShiftStart.toISOString(), e: new Date().toISOString() }); save(); btn.innerText = "KOMMEN"; btn.className = "btn-blue"; document.getElementById('live-stempel').style.display = "none"; activeShiftStart = null; }
}

setInterval(() => {
    document.getElementById('time-display').innerText = new Date().toLocaleTimeString('de-DE');
    if(activeShiftStart) {
        let d = Math.floor((new Date()-activeShiftStart)/1000);
        let h = Math.floor(d/3600), m = Math.floor((d%3600)/60), s = d%60;
        document.getElementById('live-stempel').innerText = `• SHIFT ACTIVE (${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')})`;
    }
}, 1000);

load();
setInterval(load, 15000);
</script>
