<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>THE LUX - ELITE POS v17 CLOUD</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
:root {
    --primary: #3a6df0; --primary-glow: rgba(58, 109, 240, 0.4);
    --bg: #050507; --card: rgba(22, 22, 28, 0.7); --border: rgba(255, 255, 255, 0.08);
    --text: #ffffff; --text-dim: #94a3b8; --danger: #ff4646; --success: #00f294;
}
body { 
    font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px;
    background-image: radial-gradient(circle at top right, #161e31, transparent);
    background-attachment: fixed; min-height: 100vh;
}
#header-info { position: fixed; top: 20px; left: 20px; z-index: 1000; background: var(--card); padding: 18px 25px; border-radius: 22px; border: 1px solid var(--border); backdrop-filter: blur(15px); }
#nav-right { position: fixed; top: 20px; right: 20px; display: none; gap: 12px; z-index: 1000; }
.section { display: none; margin-top: 140px; max-width: 1300px; margin-left: auto; margin-right: auto; }
.active { display: block !important; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
.card { background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid var(--border); backdrop-filter: blur(10px); text-align: center; }
button { padding: 14px 24px; border-radius: 16px; border: none; cursor: pointer; font-weight: 700; transition: 0.3s; }
.btn-blue { background: var(--primary); color: white; width: 100%; margin-top: 10px; }
.btn-red { background: var(--danger); color: white; }
.btn-dark { background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--border); }
input { background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: white; padding: 15px; border-radius: 14px; width: 100%; margin-bottom: 12px; box-sizing: border-box; }
#bill-area { margin-top: 50px; background: rgba(58,109,240,0.1); padding: 35px; border-radius: 32px; border: 1px solid var(--primary); }
</style>
</head>
<body>

<div id="header-info">
    <div id="time-display" style="font-size: 22px; font-weight: 800;">00:00:00</div>
    <div id="cloud-status" style="font-size: 10px; color: var(--primary);">VERBINDUNG...</div>
</div>

<div id="nav-right">
    <button class="btn-dark" onclick="location.reload()">Abmelden / Refresh</button>
</div>

<div id="login-overlay" style="position:fixed; inset:0; background:var(--bg); z-index:9999; display:flex; align-items:center; justify-content:center;">
    <div style="background: var(--card); padding: 50px; border-radius: 40px; width: 350px; text-align: center; border: 1px solid var(--border);">
        <h1 style="margin-top:0;">THE LUX</h1>
        <input type="text" id="logU" placeholder="Nutzername">
        <input type="password" id="logP" placeholder="Passwort">
        <button class="btn-blue" onclick="login()">LOGIN</button>
    </div>
</div>

<div id="main-ui" class="section">
    <div class="grid" id="grid-pos"></div>
    <div id="bill-area">
        <div id="bill-items" style="margin-bottom:15px;"></div>
        <div style="font-size: 28px; font-weight: 800; color: var(--primary); margin-bottom:20px;">Total: <span id="bill-total">0</span> EUR</div>
        <button class="btn-blue" style="padding:20px; font-size:18px;" onclick="checkout()">RECHNUNG ABSCHLIESSEN</button>
    </div>
</div>

<script>
// --- SCHRITT 2: FIREBASE URL ---
const CLOUD_DB = "https://the-lux-system-default-rtdb.firebaseio.com/data.json";

let users = [{name:"LUX_STAFF", pass:"Staff3221", sales:[]}];
let basket = {}, currentUser = null;

const PRODUCTS = [
    {n:"Tequila", p:500}, {n:"Whiskey", p:300}, {n:"Wein", p:200},
    {n:"Cola", p:100}, {n:"Heli-Flug", p:20000}
];

// Speichern in Firebase
async function save() {
    document.getElementById('cloud-status').innerText = "SPEICHERE...";
    await fetch(CLOUD_DB, { 
        method: 'PUT', 
        body: JSON.stringify({ users }) 
    });
    document.getElementById('cloud-status').innerText = "CLOUD AKTIV";
}

// Laden von Firebase
async function load() {
    try {
        const r = await fetch(CLOUD_DB);
        const d = await r.json();
        if(d && d.users) users = d.users;
        document.getElementById('cloud-status').innerText = "CLOUD AKTIV";
    } catch(e) { console.log("Cloud leer."); }
}

function login() {
    const u = document.getElementById('logU').value, p = document.getElementById('logP').value;
    const f = users.find(x => x.name === u && x.pass === p);
    if(f) {
        currentUser = f;
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('nav-right').style.display = 'flex';
        document.getElementById('main-ui').classList.add('active');
        renderPOS();
    } else { alert("Falsche Daten!"); }
}

function renderPOS() {
    document.getElementById('grid-pos').innerHTML = PRODUCTS.map(i => `
        <div class="card">
            <b style="font-size:18px;">${i.n}</b><br>${i.p}€
            <button class="btn-blue" onclick="add('${i.n}')">Hinzufügen</button>
        </div>`).join('');
}

function add(n) { basket[n] = (basket[n]||0)+1; renderBill(); }

function renderBill() {
    let t = 0; let h = "";
    for(let n in basket) {
        let i = PRODUCTS.find(p=>p.n===n);
        t += basket[n]*i.p;
        h += `<div>${n} x${basket[n]} (${basket[n]*i.p}€)</div>`;
    }
    document.getElementById('bill-items').innerHTML = h;
    document.getElementById('bill-total').innerText = t;
}

async function checkout() {
    if(Object.keys(basket).length === 0) return;
    const idx = users.findIndex(u => u.name === currentUser.name);
    if(!users[idx].sales) users[idx].sales = [];
    users[idx].sales.push({ date: new Date().toLocaleString(), items: basket });
    basket = {}; renderBill();
    await save();
    alert("Rechnung gespeichert!");
}

setInterval(load, 10000); // Alle 10 Sek. Daten holen
load();
setInterval(() => { document.getElementById('time-display').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
