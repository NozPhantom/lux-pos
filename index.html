<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>THE LUX - ELITE POS v17 PLATINUM</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
    --primary: #3a6df0; 
    --primary-glow: rgba(58, 109, 240, 0.5);
    --bg: #030305; 
    --card: rgba(18, 18, 24, 0.6); 
    --border: rgba(255, 255, 255, 0.05);
    --text: #ffffff; 
    --text-dim: #8a8f9d; 
    --danger: #ff3333; 
    --success: #00ff95;
    --accent-gradient: linear-gradient(135deg, #3a6df0 0%, #a855f7 100%);
}

/* --- ANIMIERTER HINTERGRUND CANVA --- */
#plexus-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1; /* Hinter allem Inhalt */
}

body { 
    font-family: 'Plus Jakarta Sans', sans-serif; 
    background: var(--bg); 
    color: var(--text); 
    margin: 0; 
    padding: 20px;
    overflow-x: hidden;
    background-attachment: fixed; 
    min-height: 100vh;
}

/* --- UI COMPONENTS (UNVERÄNDERT) --- */
#header-info { 
    position: fixed; top: 20px; left: 20px; z-index: 1000; 
    background: rgba(255, 255, 255, 0.03); 
    padding: 15px 25px; 
    border-radius: 20px; 
    border: 1px solid var(--border); 
    backdrop-filter: blur(20px); 
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    transition: transform 0.3s ease;
}

#nav-right { 
    position: fixed; top: 20px; right: 20px; display: none; gap: 12px; z-index: 1000; 
}

.section { 
    display: none; margin-top: 120px; max-width: 1400px; margin-left: auto; margin-right: auto; 
}

.active { display: block !important; animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }

@keyframes slideUp { 
    from { opacity: 0; transform: translateY(30px); filter: blur(10px); } 
    to { opacity: 1; transform: translateY(0); filter: blur(0); } 
}

.cat-nav { 
    display: flex; gap: 15px; margin-bottom: 40px; padding: 5px; overflow-x: auto; scrollbar-width: none;
}

.btn-cat { 
    background: var(--card); color: var(--text-dim); border: 1px solid var(--border); 
    padding: 16px 30px; border-radius: 18px; cursor: pointer; font-weight: 600; 
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); white-space: nowrap; backdrop-filter: blur(10px);
}

.btn-cat.active { 
    background: var(--accent-gradient); color: white; border-color: transparent; 
    box-shadow: 0 10px 25px var(--primary-glow); transform: translateY(-3px) scale(1.02);
}

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }

.card { 
    background: var(--card); padding: 30px; border-radius: 28px; border: 1px solid var(--border); 
    backdrop-filter: blur(15px); transition: all 0.4s ease; position: relative; overflow: hidden;
}

.card:hover { 
    border-color: var(--primary); box-shadow: 0 20px 40px rgba(0,0,0,0.6); transform: translateY(-5px);
}

.qty-ctrl { 
    display: flex; align-items: center; justify-content: space-between; 
    background: rgba(0,0,0,0.4); border-radius: 20px; margin-top: 25px; height: 60px; border: 1px solid var(--border);
}

.qty-btn { width: 65px; height: 100%; background: transparent; color: white; border: none; font-size: 26px; cursor: pointer; }
.qty-input { width: 70px; background: transparent; border: none; color: white; text-align: center; font-weight: 800; font-size: 22px; outline: none; }

button { 
    padding: 16px 28px; border-radius: 18px; border: none; cursor: pointer; 
    font-weight: 700; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-family: inherit;
}

.btn-blue { background: var(--accent-gradient); color: white; box-shadow: 0 8px 20px var(--primary-glow); }
.btn-blue:hover { transform: translateY(-2px); box-shadow: 0 12px 25px var(--primary-glow); filter: brightness(1.1); }
.btn-red { background: linear-gradient(135deg, #ef4444 0%, #991b1b 100%); color: white; }
.btn-dark { background: rgba(255,255,255,0.03); color: white; border: 1px solid var(--border); backdrop-filter: blur(5px); }

#bill-area { margin-top: 60px; background: rgba(58, 109, 240, 0.03); padding: 40px; border-radius: 40px; border: 1px solid rgba(58, 109, 240, 0.2); }
#bill-total { font-size: 48px; font-weight: 800; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 10000; backdrop-filter: blur(15px); }
.modal-content { background: #0a0a0e; padding: 50px; border-radius: 40px; border: 1px solid var(--border); width: 95%; max-width: 600px; box-shadow: 0 0 100px rgba(58,109,240,0.1); }

/* --- LOGIN OVERLAY --- */
#login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }

.login-card {
    background: var(--card); padding: 60px; border-radius: 50px; width: 420px; text-align: center; 
    border: 1px solid var(--border); backdrop-filter: blur(40px);
    box-shadow: 0 0 60px var(--primary-glow); /* Krasser Glow Effekt */
    animation: entrance 1s cubic-bezier(0.2, 0.8, 0.2, 1);
}

@keyframes entrance { from { transform: scale(0.9) translateY(20px); opacity: 0; filter: blur(10px); } to { transform: scale(1) translateY(0); opacity: 1; filter: blur(0); } }

input { 
    background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: white; 
    padding: 18px; border-radius: 18px; width: 100%; margin-bottom: 15px; 
    font-family: inherit; font-size: 16px; box-sizing: border-box; outline: none;
}
input:focus { border-color: var(--primary); background: rgba(0,0,0,0.5); }

</style>
</head>
<body>

<canvas id="plexus-bg"></canvas>

<div id="header-info">
    <div id="time-display" style="font-size: 24px; font-weight: 800; letter-spacing: -1px;">00:00:00</div>
    <div id="live-stempel" style="display:none; color:var(--success); font-size: 11px; font-weight: 800; letter-spacing: 1px; margin-top: 5px;">• STATUS: ACTIVE</div>
</div>

<div id="nav-right">

</div>

<div id="login-overlay">
    <div class="login-card">
        <div style="font-size: 12px; letter-spacing: 6px; color: var(--primary); margin-bottom: 15px; font-weight: 800; opacity: 0.8;">PREMIUM POS</div>
        <h1 style="font-size: 56px; margin: 0 0 40px 0; letter-spacing: -3px; font-weight: 800; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">THE LUX</h1>
        <input type="text" id="logU" placeholder="Benutzername">

        <button class="btn-cat" onclick="changeTab('Fahrten', this)">Fahrten</button>

    <div id="bill-area">

</div>

<div id="dash-ui" class="section">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:50px;">

</div>

<div id="modal-new-user" class="modal"><div class="modal-content"><h3>Neuer Zugang</h3><input type="text" id="new-u-name" placeholder="Name"><input type="password" id="new-u-pass" placeholder="Passwort"><select id="new-u-role"><option>Geschäftsinhaber</option><option>Geschäftsführer</option><option>Management</option><option>Bartender</option><option>Kellner</option><option>Security</option><option>Reception</option></select><label style="display:flex; align-items:center; gap:10px; margin: 20px 0; color: var(--text-dim);"><input type="checkbox" id="new-u-chauffeur" style="width:auto; margin:0;"> Zweitrolle Chauffeur</label><div style="display:flex; gap:15px; margin-top:40px;"><button class="btn-blue" style="flex:2" onclick="saveNewUser()">SPEICHERN</button><button class="btn-dark" style="flex:1" onclick="closeModals()">ABBRUCH</button></div></div></div>
<div id="modal-lager-edit" class="modal"><div class="modal-content"><h3 id="lager-edit-title">Bestand</h3><input type="number" id="lager-edit-val" placeholder="Menge"><button class="btn-blue" style="width:100%" onclick="saveLagerEdit()">SPEICHERN</button></div></div>
<div id="modal-user-view" class="modal"><div class="modal-content"><h2 id="view-u-name" style="margin: 0 0 5px 0; font-size: 32px;"></h2><p id="view-u-role" style="color:var(--primary); font-weight:800; font-size: 14px; margin: 0 0 30px 0;"></p><div id="view-u-stats" style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:30px;"></div><div id="view-u-logs" style="max-height:200px; overflow-y:auto; background: rgba(0,0,0,0.2); border-radius: 20px; padding: 15px;"></div><button class="btn-dark" style="width:100%; margin-top:30px;" onclick="closeModals()">ZURÜCK</button></div></div>

<script>
// --- LOGIK (UNVERÄNDERT) ---
const CLOUD_DB = "https://the-lux-system-default-rtdb.firebaseio.com/data.json";
const WH_MAIN = "https://discord.com/api/webhooks/1480511718445547564/eF7F71sEzjAeEuisEI8C59wX9yzhiw8ClXaGHG45Vo7ZLuZgNXftx0tUpgG-w6ISe2pe";
const WH_BETS = "https://discord.com/api/webhooks/1480522708092588064/zdVPCFNZL7SEv9taen6e4zqFYZca32uHVTWC6HDMBisTkG8dQfi5YwFjtaOsYrv8fRkH";
const WH_STOCK = "https://discord.com/api/webhooks/1480549073256710214/nXBqxQMs8fo5PLo_sVyH7STy2tUqOauxdRCXek0gd1lmBDCtb0Qw0WsguY_J1WCs7ecj";

const ALL_PRODUCTS = [
    {n:"Tequila", p:500, c:"Getränke"}, {n:"Whiskey", p:300, c:"Getränke"}, {n:"Wein", p:200, c:"Getränke"},
    {n:"Champagner", p:250, c:"Getränke"}, {n:"Gin", p:200, c:"Getränke"}, {n:"Cognac", p:300, c:"Getränke"},
    {n:"Cocktail", p:200, c:"Getränke"}, {n:"Martini", p:200, c:"Getränke"}, {n:"Cola", p:100, c:"Getränke"},
    {n:"Energy", p:100, c:"Getränke"}, {n:"Wasser", p:100, c:"Getränke"},
    {n:"Pommes", p:150, c:"Snacks"}, {n:"Erdnüsse", p:100, c:"Snacks"},
    {n:"Grundgebühr Fahrt", p:10000, c:"Fahrten"}, {n:"Kilometer Fahrt", p:200, c:"Fahrten"},
    {n:"Grundgebühr Heli", p:20000, c:"Heli"}, {n:"Kilometer Heli", p:500, c:"Heli"},
    {n:"Event Eintritt", p:5000, c:"Fightclub"}, {n:"Miete Grundgebühr 1H", p:50000, c:"Fightclub"}, {n:"+30 Minuten", p:30000, c:"Fightclub"}
];

let users = [{name:"LUX_STAFF", pass:"Staff3221", role:"Geschäftsinhaber", logs:[], sales:[]}];
let lager = {};
let basket = {}, manualBets = [], currentUser = null, activeShiftStart = null, currentEditLager = null, selectedUserIdx = null;

async function save() { await fetch(CLOUD_DB, { method: 'PUT', body: JSON.stringify({ users, lager }) }); }
async function load() {
    try {
        const r = await fetch(CLOUD_DB);
        const d = await r.json();
        if(d && d.users) users = d.users;
        if(d && d.lager) lager = d.lager;
    } catch(e) {}
}

function login() {
    const u = document.getElementById('logU').value, p = document.getElementById('logP').value;
    const f = users.find(x => x.name === u && x.pass === p);
    if(f) {
        currentUser = f; document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('nav-right').style.display = 'flex';
        document.getElementById('main-ui').classList.add('active');
        if(["Geschäftsinhaber", "Geschäftsführer", "Management"].includes(f.role)) document.getElementById('dash-btn').style.display = 'block';
        ALL_PRODUCTS.forEach(i => { if(lager[i.n] === undefined) lager[i.n] = 999; });
        changeTab('Getränke', document.querySelector('.btn-cat'));
    } else alert("CODE FALSCH");
}

function changeTab(cat, btn) {
    document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active')); btn.classList.add('active');
    if(cat === "Wetten") { document.getElementById('grid-pos').style.display='none'; document.getElementById('bet-form').style.display='block'; }
    else { document.getElementById('grid-pos').style.display='grid'; document.getElementById('bet-form').style.display='none'; renderPOS(cat === "Flüge" ? "Heli" : cat); }
}

function renderPOS(cat) {
    document.getElementById('grid-pos').innerHTML = ALL_PRODUCTS.filter(i => i.c === cat).map(i => `
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:start;">
                <div><b style="font-size:18px;">${i.n}</b><br><small style="color:var(--text-dim)">Bestand: ${lager[i.n] === Infinity ? '∞' : lager[i.n]}</small></div>
                <div style="font-weight:800; color:var(--primary); font-size:20px;">${i.p}€</div>
            </div>
            <div class="qty-ctrl">
                <button class="qty-btn" onclick="updateBasket('${i.n}',-1)">−</button>
                <input type="number" class="qty-input" id="inp-${i.n}" value="${basket[i.n]||0}" onchange="manualInput('${i.n}', this.value)">
                <button class="qty-btn" onclick="updateBasket('${i.n}',1)">+</button>
            </div>
        </div>`).join('');
}

function updateBasket(name, val) { manualInput(name, (basket[name] || 0) + val); }
function manualInput(name, val) {
    let t = parseInt(val) || 0; if(t < 0) t = 0; if(lager[name] !== Infinity && t > lager[name]) t = lager[name];
    basket[name] = t; renderPOS(document.querySelector('.btn-cat.active').innerText === "Flüge" ? "Heli" : document.querySelector('.btn-cat.active').innerText); renderBill();
}

function addBetToBill() {
    const n = document.getElementById('bet-user').value, t = document.getElementById('bet-tel').value, a = parseInt(document.getElementById('bet-amount').value);
    if(!n || a < 10000) return alert("MIN 10.000€");
    manualBets.push({name:n, tel:t, amount:a}); document.getElementById('bet-user').value=""; document.getElementById('bet-tel').value=""; document.getElementById('bet-amount').value=""; renderBill();
}

function renderBill() {
    let t = 0, h = "";
    for(let n in basket) if(basket[n]>0) { let i = ALL_PRODUCTS.find(p=>p.n===n); t+=basket[n]*i.p; h+=`<div>${n} x${basket[n]}</div>`; }
    manualBets.forEach(b => { t+=b.amount; h+=`<div style="color:var(--danger)">Wette: ${b.name}</div>`; });
    document.getElementById('bill-items').innerHTML = h; document.getElementById('bill-total').innerText = t.toLocaleString()+" EUR"; return t;
}

async function checkout() {
    const t = renderBill(); if(t === 0) return;
    const itemsLog = [];
    for(let n in basket) {
        if(basket[n] > 0) {
            itemsLog.push({n, q: basket[n], p: ALL_PRODUCTS.find(x=>x.n===n).p});
            if(lager[n] !== Infinity) { lager[n] -= basket[n]; }
        }
    }
    const idx = users.findIndex(u => u.name === currentUser.name);
    if(!users[idx].sales) users[idx].sales = [];
    users[idx].sales.push({ d: new Date().toISOString(), total: t, items: itemsLog });
    
    await fetch(WH_MAIN, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({embeds:[{title:"BUCHUNG", description:`Mitarbeiter: ${currentUser.name}\nTOTAL: ${t}€`, color:3829232}]})});
    
    basket={}; manualBets=[]; await save(); renderBill(); alert("BUCHUNG ERFOLGREICH");
}

function toggleView() {
    document.getElementById('dash-ui').classList.toggle('active');
    document.getElementById('main-ui').classList.toggle('active');
    if(document.getElementById('dash-ui').classList.contains('active')) {
        renderManagement();
    }
}

function renderManagement() {
    document.getElementById('user-list').innerHTML = users.map((u, i) => `<div class="card" onclick="viewUserLogs(${i})" style="cursor:pointer"><b>${u.name}</b><br><small>${u.role}</small></div>`).join('');
    document.getElementById('lager-list').innerHTML = Object.keys(lager).map(n => `<div class="card" style="padding:20px;"><div style="display:flex; justify-content:space-between; align-items:center;"><small>${n}</small><b>${lager[n]}</b><button class="btn-dark" style="padding:5px 10px;" onclick="openLagerEdit('${n}')">EDIT</button></div></div>`).join('');
}

function viewUserLogs(i) {
    selectedUserIdx = i; const u = users[i]; 
    document.getElementById('view-u-name').innerText = u.name;
    document.getElementById('view-u-role').innerText = u.role.toUpperCase();
    openModal('modal-user-view');
}

function openModal(id) { document.getElementById(id).style.display = 'flex'; }
function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
function setUnendlich() { document.getElementById('unendlich-msg').style.display = 'block'; }
function openLagerEdit(n) { currentEditLager = n; document.getElementById('lager-edit-title').innerText = n; openModal('modal-lager-edit'); }
async function saveLagerEdit() { lager[currentEditLager] = parseInt(document.getElementById('lager-edit-val').value); await save(); closeModals(); renderManagement(); }
async function saveNewUser() { const n = document.getElementById('new-u-name').value, p = document.getElementById('new-u-pass').value, r = document.getElementById('new-u-role').value; users.push({name:n, pass:p, role:r, logs:[], sales:[]}); await save(); closeModals(); renderManagement(); }

function toggleStempel() {
    const btn = document.getElementById('stempel-btn');
    if(btn.innerText === "KOMMEN") { activeShiftStart = new Date(); btn.innerText = "GEHEN"; btn.className = "btn-red"; document.getElementById('live-stempel').style.display = "block"; }
    else { btn.innerText = "KOMMEN"; btn.className = "btn-blue"; document.getElementById('live-stempel').style.display = "none"; activeShiftStart = null; }
}

setInterval(() => {
    document.getElementById('time-display').innerText = new Date().toLocaleTimeString('de-DE');
}, 1000);

load();

// --- ANIMIERTER HINTERGRUND JAVASCRIPT (PLEXUS EFFECT) ---
const canvas = document.getElementById('plexus-bg');
const ctx = canvas.getContext('2d');
let particles = [];
const particleCount = 70; // Anzahl der Punkte
const connectDistance = 180; // Ab wenn Linien gezeichnet werden
const mouse = { x: null, y: null, radius: 200 }; // Maus-Interaktion

// Canvas Größe anpassen
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Mausposition tracken
window.addEventListener('mousemove', (e) => {
    mouse.x = e.x;
    mouse.y = e.y;
});

// Partikel Klasse
class Particle {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 1;
        this.vx = (Math.random() - 0.5) * 0.4; // Geschwindigkeit X ("rumschwabbeln")
        this.vy = (Math.random() - 0.5) * 0.4; // Geschwindigkeit Y
        // Farbe zwischen Blau und Violett mischen
        this.color = Math.random() > 0.5 ? '#3a6df0' : '#a855f7';
    }

    // Partikel bewegen
    update() {
        // Maus-Abstoßung (Krasse Interaktion)
        if (mouse.x && mouse.y) {
            let dx = this.x - mouse.x;
            let dy = this.y - mouse.y;
            let distance = Math.sqrt(dx*dx + dy*dy);
            if (distance < mouse.radius) {
                let forceDirX = dx / distance;
                let forceDirY = dy / distance;
                let force = (mouse.radius - distance) / mouse.radius;
                this.vx += forceDirX * force * 0.03;
                this.vy += forceDirY * force * 0.03;
            }
        }

        // Geschwindigkeit dämpfen (damit sie nicht unendlich beschleunigen)
        this.vx *= 0.99;
        this.vy *= 0.99;

        // Normale Bewegung
        this.x += this.vx;
        this.y += this.vy;

        // Wände abprallen
        if (this.x > canvas.width || this.x < 0) this.vx = -this.vx;
        if (this.y > canvas.height || this.y < 0) this.vy = -this.vy;
    }

    // Partikel zeichnen
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
    }
}

// Partikel initialisieren
for (let i = 0; i < particleCount; i++) {
    particles.push(new Particle());
}

// Linien zeichnen (Plexus)
function drawLines() {
    for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
            let dx = particles[i].x - particles[j].x;
            let dy = particles[i].y - particles[j].y;
            let distance = Math.sqrt(dx*dx + dy*dy);

            if (distance < connectDistance) {
                // Opazität basierend auf Entfernung (fadet aus)
                let opacity = 1 - (distance / connectDistance);
                ctx.strokeStyle = `rgba(138, 143, 157, ${opacity * 0.2})`; // Dimmed Border Color
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.stroke();
            }
        }
    }
}

// Animations-Schleife
function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height); // Canvas leeren

    particles.forEach(p => {
        p.update();
        p.draw();
    });

    drawLines();
    requestAnimationFrame(animate);
}

animate();
</script>
</body>
